<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>DMG | Settings</title>
    <link rel="icon" type="image/png" href="google-classroom-logo.png" sizes="16x16" />
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/css/bootstrap.min.css" />
    <link rel="stylesheet" href="./css/style.css" />
    <link rel="stylesheet" href="./css/popup.css" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Roboto:wght@100&display=swap" />
    <script>
    window.onload = function() {
      // Check if user preferences are stored, otherwise use defaults
      var userTitle = localStorage.getItem('userTitle') || 'Your Default Title';
      var userIcon = localStorage.getItem('userIcon') || 'default-icon.png';

      // Set tab title
      document.title = userTitle;

      // Set tab icon
      var iconLink = document.querySelector("link[rel~='icon']");
      iconLink.href = userIcon;
    }
  </script>
    <style>
      body {
        font-family: Roboto;
        color: #000;
        text-align: center;
        background-color: #1c1c1c;
        cursor: url('images/pointerblue1.png'), none;
      }

      .heading {
        color: #fff;
        font-size: 24px;
        margin-bottom: 10px;
      }

      a:hover,
      button:hover {
        cursor: url('images/handblue120.png'), pointer;
      }
    </style>
  </head>
  <body>
    <nav class="navbar navbar-inverse">
      <div class="container-fluid">
        <div class="navbar-header">
          <a href="https://github.com/reider71164">
            <img src="./images/uw.png" alt="" width="50" height="50" class="logo" />
          </a>
        </div>
        <div class="navitems">
          <ul class="nav navbar-nav">
            <li>
              <a href="index.html">Home</a>

            <li class="active">
              <a href="settings.html">Settings</a>
            </li>
          </ul>
        </div>
      </div>
    </nav>
    <div id="header">
      <img src="logo.png" alt="" />
    </div>
    <div class="container">
      <div></div>
      <style>
        input {
          color: black;
        }
      </style>
      <div class="container">
        <div class="heading">Cloaks</div>
        <!-- Google Classroom Button -->
        <button id="googleBtn" class="btn" onclick="changeGoogle()">
          <span id="googleText">Google Classroom</span>
        </button>

        <!-- Math iReady Button -->
        <button id="ireadyBtn1" class="btn" onclick="changeiReady1()">
          <span id="ireadyText1">Math iReady</span>
        </button>

        <!-- Reading iReady Button -->
        <button id="ireadyBtn2" class="btn" onclick="changeiReady2()">
          <span id="ireadyText2">Reading iReady</span>
        </button>

        <!-- Schoology Button -->
        <button id="schoologyBtn" class="btn" onclick="changeSchoology()">
          <span id="schoologyText">Schoology</span>
        </button>
      </div>
    </div>
    <script>
      window.onload = function () {
        // Check if user preferences are stored, otherwise use defaults
        var userTitle = localStorage.getItem('userTitle') || 'Google Classroom';
        var userIcon = localStorage.getItem('userIcon') || 'google-classroom-logo.png';

        // Set tab title
        document.title = userTitle;

        // Set tab icon
        var iconLink = document.querySelector("link[rel~='icon']");
        iconLink.href = userIcon;
      };

      function changeGoogle() {
        localStorage.setItem('userTitle', 'Google Classroom');
        localStorage.setItem('userIcon', 'google-classroom-logo.png');
        updateTab();
      }

      function changeiReady1() {
        localStorage.setItem('userTitle', 'Math to do, iReady');
        localStorage.setItem('userIcon', 'images/icon_964188f.ico');
        updateTab();
      }

      function changeiReady2() {
        localStorage.setItem('userTitle', 'Reading to do, iReady');
        localStorage.setItem('userIcon', 'images/icon_964188f.ico');
        updateTab();
      }

      function changeSchoology() {
        localStorage.setItem('userTitle', 'Home | Schoology');
        localStorage.setItem('userIcon', 'images/schoology.ico');
        updateTab();
      }

      function updateTab() {
        var userTitle = localStorage.getItem('userTitle') || 'Google Classroom';
        var userIcon = localStorage.getItem('userIcon') || 'google-classroom-logo.png';

        // Set tab title
        document.title = userTitle;

        // Set tab icon
        var iconLink = document.querySelector("link[rel~='icon']");
        iconLink.href = userIcon;
      }
    </script>
  </body>
